<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    {% include mathjax.html %}

    {% seo %}
    {% include head-custom.html %}

    <style>
      /* =======================================================
         THEME COLOR VARIABLES (Light/Dark Mode Engine)
         ======================================================= */
      :root[data-theme="dark"] {
        --bg-inner: #273661;        
        --bg-middle: #172244;       
        --bg-outer: #0a122c;        
        --text-main: #f1f5f9;       
        --text-muted: #cbd5e1;      
        --text-brand: #ffffff;      
        --text-title: #38bdf8;      
        --border-color: #475569;    
        --menu-dropdown: #172244;   
        --toggle-bg: transparent;       
        --toggle-icon: #38bdf8;     
      }

      :root[data-theme="light"] {
        --bg-inner: #e6f0fa;        
        --bg-middle: #bcd4ec;       
        --bg-outer: #ffffff;        
        --text-main: #1e293b;       
        --text-muted: #64748b;      
        --text-brand: #0f172a;      
        --text-title: #1e40af;      
        --border-color: #94a3b8;    
        --menu-dropdown: #ffffff;
        --toggle-bg: transparent;       
        --toggle-icon: #38bdf8;     
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-inner);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      #header_wrap {
        background-color: transparent !important; 
        height: 80px;
        width: 100%;
        display: flex;
        align-items: center;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 150; 
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      header.inner {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }

      header nav {
        display: flex;
        align-items: center;
      }

      header .nav-brand {
        text-decoration: none;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--text-brand);
        letter-spacing: -0.2px;
        white-space: nowrap;
        transition: color 0.3s ease;
      }

      .nav-links-container {
        display: flex;
        align-items: center;
        width: 100%;
      }

      header .nav-links {
        display: flex;
        align-items: center;
      }

      header .nav-links a {
        text-decoration: none;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 16px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: -0.2px;
        white-space: nowrap;
        margin-left: 24px;
        transition: color 0.2s ease;
      }

      header .nav-links a:hover {
        color: var(--text-brand);
      }

      header .nav-divider {
        width: 1.5px;
        height: 22px;
        background-color: var(--border-color);
        margin-left: 24px;
        opacity: 0.85;
        transition: background-color 0.3s ease;
      }

      .theme-toggle-btn {
        background: transparent;
        border: none;
        padding: 0;
        margin-left: auto; 
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--toggle-icon);
        transition: color 0.3s ease, transform 0.2s ease;
      }
      .theme-toggle-btn:hover {
        transform: scale(1.1);
      }

      .menu-toggle, .menu-button-container {
        display: none;
      }

      .canvas-container {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        margin-top: 80px; 
      }

      .middle-layer-wrap {
        background-color: var(--bg-middle);
        position: relative;
        width: 100%;
        height: auto;
        box-sizing: border-box;
        padding-top: 40px; 
        padding-bottom: 50px; 
        z-index: 10;
        transition: background-color 0.3s ease;

        clip-path: polygon(
          0% 20px, 10% 0px, 20% 20px, 30% 0px, 40% 20px, 50% 0px, 60% 20px, 70% 0px, 80% 20px, 90% 0px, 100% 20px,
          100% 100%, 0% 100%
        );
      }

      .middle-layer-title-container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        text-align: center;
        box-sizing: border-box;
      }

      .middle-layer-title-container h1 {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 36px;
        font-weight: 700;
        color: var(--text-title);
        letter-spacing: -0.5px;
        line-height: 1.3;
        transition: color 0.3s ease;
      }

      #main_content_wrap {
        background-color: var(--bg-outer);
        position: relative;
        z-index: 20; 
        margin-top: -30px; 
        padding: 60px 0;
        transition: background-color 0.3s ease;

        --peak: 24px;
        clip-path: polygon(
          0% var(--peak), 10% 0px, 20% var(--peak), 30% 0px, 40% var(--peak), 50% 0px, 60% var(--peak), 70% 0px, 80% var(--peak), 90% 0px, 100% var(--peak),
          100% calc(100% - 20px), 90% 100%, 80% calc(100% - 20px), 70% 100%, 60% calc(100% - 20px), 50% 100%, 40% calc(100% - 20px), 30% 100%, 20% calc(100% - 20px), 10% 100%, 0% calc(100% - 20px)
        );
      }

      section.inner {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      section.inner h2 {
        display: inline-block;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--text-title);
        letter-spacing: -0.4px;
        margin-top: 0;
        margin-bottom: 24px;
        padding-bottom: 8px;
        border-bottom: 3.5px solid var(--border-color); 
        transition: color 0.3s ease, border-color 0.3s ease;
      }

      section.inner a {
        color: #38bdf8; 
      }
      
      html[data-theme="light"] section.inner a {
        color: #1667A9; 
      }

      /* =======================================================
         SPLIT-WING FOOTER LAYOUT
         ======================================================= */
      #footer_wrap {
        background-color: transparent;
        padding: 30px 0 40px 0;
        margin-top: auto;
        position: relative;
        z-index: 30; 
      }

      footer.inner {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        box-sizing: border-box;
      }

      .footer-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        font-size: 15px;
        color: var(--text-muted);
      }

      .footer-left {
        display: flex;
        align-items: center;
      }

      .footer-left a {
        color: #38bdf8;
        text-decoration: underline;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      html[data-theme="light"] .footer-left a {
        color: #1667A9;
      }

      .footer-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .footer-right strong {
        color: var(--text-brand);
        font-weight: 700;
      }

      .footer-profiles-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .footer-profiles-group a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition: transform 0.2s ease, color 0.2s ease;
      }

      .footer-profiles-group a svg {
        height: 24px;
        width: 24px;
        fill: currentColor;
        display: block;
      }

      .footer-profiles-group a:hover {
        color: var(--text-title);
        transform: translateY(-3px);
      }

      /* =======================================================
         GLOBAL REINFORCED POPUP SYSTEM STYLES
         ======================================================= */
      .site-modal-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: rgba(0, 0, 0, 0.6) !important;
        backdrop-filter: blur(5px) !important;
        -webkit-backdrop-filter: blur(5px) !important;
        z-index: 2147483647 !important; 
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .site-modal-overlay.active {
        opacity: 1 !important;
        pointer-events: auto !important;
      }

      .site-modal-window {
        background: var(--menu-dropdown);
        color: var(--text-main);
        width: 90%;
        max-width: 650px;
        max-height: 82vh;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        transform: translateY(20px);
        transition: transform 0.2s ease;
      }

      .site-modal-overlay.active .site-modal-window {
        transform: translateY(0) !important;
      }

      .site-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid var(--border-color);
      }

      .site-modal-header h3 {
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--text-title);
      }

      .site-modal-close-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 28px;
        line-height: 1;
        padding: 4px;
        transition: color 0.15s ease;
      }

      .site-modal-close-btn:hover {
        color: var(--text-main);
      }

      .site-modal-body {
        padding: 24px;
        overflow-y: auto;
        font-size: 15px;
        line-height: 1.6;
      }
      
      .site-modal-body p {
        margin-top: 0;
        margin-bottom: 16px;
      }
      .site-modal-body p:last-child {
        margin-bottom: 0;
      }

      /* =======================================================
         SOLUTION PAGE STYLES (shared across all chapter files)
         ======================================================= */
      .lemma-box {
        background-color: rgba(120, 80, 255, 0.04);
        border: 1px solid rgba(120, 80, 255, 0.2);
        border-radius: 6px;
        padding: 16px;
        margin-top: 12px;
        margin-bottom: 16px;
      }
      html[data-theme="dark"] .lemma-box {
        background-color: rgba(140, 100, 255, 0.07);
        border-color: rgba(140, 100, 255, 0.3);
      }
      .lemma-box hr {
        border: 0;
        border-top: 1px solid rgba(120, 80, 255, 0.2);
        margin: 16px 0;
      }
      html[data-theme="dark"] .lemma-box hr {
        border-top-color: rgba(140, 100, 255, 0.3);
      }
      .status-badge.lemma {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        line-height: 1.4;
        background: rgba(120, 80, 255, 0.1);
        color: #6d28d9;
        margin-bottom: 10px;
      }
      html[data-theme="dark"] .status-badge.lemma {
        background: rgba(140, 100, 255, 0.15);
        color: #a78bfa;
      }
      .status-badge.unsolved {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        line-height: 1.4;
        background: rgba(185, 28, 28, 0.08);
        color: #b91c1c;
        margin-bottom: 10px;
      }
      html[data-theme="dark"] .status-badge.unsolved {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
      }
      .unsolved-box {
        background-color: rgba(185, 28, 28, 0.03);
        border: 1px solid rgba(185, 28, 28, 0.2);
        border-radius: 6px;
        padding: 16px;
        margin-top: 12px;
        margin-bottom: 24px;
      }
      html[data-theme="dark"] .unsolved-box {
        background-color: rgba(248, 113, 113, 0.05);
        border-color: rgba(248, 113, 113, 0.2);
      }
      .sub-exercise-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-title);
        margin: 20px 0 8px 0;
      }
      .sub-exercise-title:first-child {
        margin-top: 0;
      }
      .solution-box {
        background-color: rgba(0, 122, 255, 0.04);
        border: 1px solid rgba(0, 122, 255, 0.15);
        border-radius: 6px;
        padding: 16px;
        margin-top: 12px;
        margin-bottom: 24px;
      }
      html[data-theme="dark"] .solution-box {
        background-color: rgba(10, 132, 255, 0.06);
        border-color: rgba(10, 132, 255, 0.25);
      }
      .solution-box hr {
        border: 0;
        border-top: 1px solid rgba(0, 122, 255, 0.15);
        margin: 16px 0;
      }
      html[data-theme="dark"] .solution-box hr {
        border-top-color: rgba(10, 132, 255, 0.25);
      }
      .status-badge.success {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        line-height: 1.4;
        background: rgba(0, 122, 255, 0.1);
        color: #006ddb;
        margin-bottom: 10px;
      }
      html[data-theme="dark"] .status-badge.success {
        background: rgba(10, 132, 255, 0.15);
        color: #5ea7ff;
      }
      .semester-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-title);
        margin: 0 0 14px 0;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 6px;
      }

      /* =======================================================
         SHARED LAYOUT UTILITIES
         ======================================================= */
      .intro-paragraph {
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-main);
        margin-bottom: 24px;
      }

      .semester-timeline {
        display: flex;
        flex-direction: column;
        gap: 36px;
      }

      /* =======================================================
         SHARED TABLE ENGINE
         ======================================================= */
      .table-wrapper {
        overflow-x: auto;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: rgba(148, 163, 184, 0.02);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 15px;
        table-layout: fixed;
      }

      th {
        background: rgba(148, 163, 184, 0.05);
        font-weight: 600;
        color: var(--text-title);
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
        vertical-align: middle;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td:nth-child(2) {
        white-space: normal;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:nth-child(even) {
        background: rgba(148, 163, 184, 0.01);
      }

      .text-center {
        text-align: center;
      }

      /* =======================================================
         SHARED VIEW / NO-LINK BUTTON
         ======================================================= */
      .view-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none !important;
        padding: 6px 12px;
        border-radius: 6px;
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      .view-btn:hover {
        background: rgba(30, 64, 175, 0.06);
        color: var(--text-title);
      }

      html[data-theme="dark"] .view-btn:hover {
        background: rgba(56, 189, 248, 0.08);
      }

      .no-link {
        font-size: 13px;
        color: var(--text-muted);
        display: inline-block;
        text-align: center;
        width: 100%;
      }

      /* =======================================================
         SHARED STATUS BADGE BASE
         ======================================================= */
      .status-badge {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 0.5px;
        padding: 2px 8px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        line-height: 1.4;
      }

      .status-badge.preparation {
        background: rgba(142, 142, 147, 0.12);
        color: var(--text-muted);
      }

      /* =======================================================
         SHARED PHD OPINION BOX
         ======================================================= */
      .phd-opinion-box {
        background: rgba(0, 112, 243, 0.04);
        border-left: 4px solid #0070f3;
        padding: 14px 16px;
        border-radius: 0 8px 8px 0;
        font-size: 14.5px;
        line-height: 1.5;
        color: var(--text-main);
        margin-bottom: 24px;
      }

      html[data-theme="dark"] .phd-opinion-box {
        background: rgba(0, 112, 243, 0.08);
        border-left-color: #38bdf8;
      }

      /* =======================================================
         SHARED RESEARCH / COURSE PAGE LAYOUT
         ======================================================= */
      .research-container {
        max-width: 850px;
        margin: 0 auto;
        padding: 10px 0;
      }

      .research-intro {
        font-size: 17px;
        line-height: 1.6;
        color: var(--text-main);
        margin-bottom: 40px;
      }

      .research-section {
        margin-bottom: 50px;
      }

      .section-title {
        font-size: 24px;
        margin-bottom: 24px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
      }

      .section-desc {
        font-size: 15px;
        color: var(--text-muted);
        margin-top: -12px;
        margin-bottom: 24px;
      }

      /* =======================================================
         SHARED TALKS / COURSE LIST LAYOUT
         ======================================================= */
      .talks-clean-list {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .talk-item {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
      }

      .time-marker {
        flex: 0 0 100px;
        padding-top: 3px;
      }

      .time-date {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .talk-body {
        flex: 1;
      }

      .talk-venue {
        font-size: 15px;
        color: var(--text-main);
        display: block;
        line-height: 1.6;
      }

      .pub-links, .talk-links {
        margin-top: 0px;
        flex: 0 0 auto;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .talk-item > .talk-links {
        min-width: 110px;
      }

      .talk-links.stacked {
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }

      .pub-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 6px;
        text-decoration: none !important;
        font-weight: 500;
        white-space: nowrap;
        transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
        border: 1px solid var(--border-color);
      }

      .arxiv-btn {
        background: rgba(179, 27, 27, 0.05);
        color: #4a4a4a;
        border-color: rgba(179, 27, 27, 0.2);
      }

      .arxiv-btn:hover {
        background: #b31b1b;
        color: #ffffff !important;
        border-color: #b31b1b;
      }

      html[data-theme="dark"] .arxiv-btn {
        background: rgba(255, 100, 100, 0.08);
        color: #b0b0b0;
        border-color: rgba(255, 100, 100, 0.25);
      }

      html[data-theme="dark"] .arxiv-btn:hover {
        background: #ff6464;
        color: #121212 !important;
      }

      .slides-btn {
        background: rgba(0, 122, 255, 0.05);
        color: #0076f5;
        border-color: rgba(0, 122, 255, 0.2);
      }

      .slides-btn:hover {
        background: #0076f5;
        color: #ffffff !important;
        border-color: #0076f5;
      }

      html[data-theme="dark"] .slides-btn {
        background: rgba(10, 132, 255, 0.08);
        color: #4094ff;
        border-color: rgba(10, 132, 255, 0.25);
      }

      html[data-theme="dark"] .slides-btn:hover {
        background: #4094ff;
        color: #121212 !important;
      }

      /* =======================================================
         SHARED COURSE OVERVIEW GRID
         ======================================================= */
      .seminar-overview-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 35px;
      }

      .overview-block {
        background: rgba(148, 163, 184, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 24px;
      }

      .full-width-block {
        grid-column: 1 / -1;
      }

      .text-accent-left { border-left: 3px solid var(--text-title); }
      .text-accent-right { border-left: 3px solid var(--text-muted); }

      .overview-heading {
        margin: 0 0 20px 0;
        font-size: 15px;
        font-weight: 700;
        color: var(--text-title);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .styled-curriculum-list, .styled-sources-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .styled-curriculum-list li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .styled-curriculum-list li::before {
        content: "•";
        color: var(--text-muted);
        font-size: 16px;
        line-height: 1.4;
      }

      .list-text, .source-text {
        font-size: 14.5px;
        line-height: 1.5;
        color: var(--text-main);
      }

      .styled-sources-list li {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .source-icon {
        color: var(--text-muted);
        margin-top: 4px;
        flex-shrink: 0;
        opacity: 0.7;
      }

      .book-title {
        font-style: italic;
        color: var(--text-title);
      }

      .seminar-disclaimer-box {
        margin-top: 40px;
        font-size: 14px;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        padding-top: 16px;
        line-height: 1.5;
      }

      /* =======================================================
         SHARED MOBILE RESPONSIVE — TABLES
         ======================================================= */
      @media (max-width: 600px) {
        table { table-layout: auto; }
        table, thead, tbody, th, td, tr { display: block; }
        thead { display: none; }
        tr { border-bottom: 1px solid var(--border-color); padding: 14px 16px; }
        tr:last-child { border-bottom: none; }
        td { border: none; padding: 4px 0; white-space: normal; }
        td:nth-of-type(1) { font-size: 16px; }
        td:nth-of-type(2) { color: var(--text-title); font-weight: 500; margin-bottom: 6px; text-align: left; }
        td:nth-of-type(3) { display: inline-block; margin-right: 12px; }
        td:nth-of-type(4) { display: block; margin-top: 10px; padding: 0; }
        .no-link { display: block; width: 100%; text-align: left; padding: 8px 12px;
          background: rgba(148, 163, 184, 0.02); border: 1px solid var(--border-color); border-radius: 6px; }
        .text-center { text-align: left; }
      }

      /* =======================================================
         SHARED MOBILE RESPONSIVE — COURSE/TALK LISTS
         ======================================================= */
      @media (max-width: 780px) {
        .seminar-overview-section { grid-template-columns: 1fr; gap: 20px; }
      }

      @media (max-width: 680px) {
        .talk-item { flex-direction: column; align-items: flex-start; gap: 6px; }
        .time-marker { flex: 0 0 auto; }
        .talk-venue { display: block; }
        .pub-links, .talk-links { width: 100%; justify-content: flex-start; min-width: 0 !important; margin-top: 4px; }
        .talk-links.stacked { align-items: flex-start; }
        .no-link { display: none; }
      }

      @media (max-width: 768px) {
        .nav-links-container { width: auto; margin-left: auto; }
        .menu-button-container { display: flex; align-items: center; justify-content: center; cursor: pointer; width: 44px; height: 44px; box-sizing: border-box; order: 3; }
        .menu-button, .menu-button::before, .menu-button::after { display: block; background-color: var(--text-brand); position: relative; height: 2px; width: 22px; transition: transform 400ms cubic-bezier(0.23, 1, 0.32, 1), background-color 0.3s ease; border-radius: 2px; }
        .menu-button::before { content: ''; position: absolute; top: -7px; }
        .menu-button::after { content: ''; position: absolute; bottom: -7px; }
        .theme-toggle-btn { margin-left: 0; margin-right: 16px; order: 2; }
        
        .middle-layer-wrap { padding-top: 40px; padding-bottom: 50px; }
        .middle-layer-title-container h1 { font-size: 28px; }
        section.inner h2 { font-size: 24px; border-bottom-width: 3px; }
        #main_content_wrap { margin-top: -30px; }
        header .nav-links { position: absolute; top: 80px; right: 20px; flex-direction: column; align-items: flex-start; width: 200px; background-color: var(--menu-dropdown); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 0; display: none; box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.15); z-index: 200; }
        header .nav-links a { width: 100%; padding: 12px 20px; margin-left: 0; box-sizing: border-box; }
        header .nav-links a:hover { background-color: var(--bg-inner); }
        header .nav-divider { display: none; }
        .menu-toggle:checked ~ .nav-links-container .nav-links { display: flex; }
        .menu-toggle:checked ~ .nav-links-container .menu-button-container .menu-button { background: rgba(255, 255, 255, 0); }
        .menu-toggle:checked ~ .nav-links-container .menu-button-container .menu-button::before { top: 0; transform: rotate(45deg); }
        .menu-toggle:checked ~ .nav-links-container .menu-button-container .menu-button::after { bottom: 0; transform: rotate(-45deg); }
        
        .footer-container { flex-direction: column; text-align: center; justify-content: center; gap: 14px; }
        .footer-right { flex-direction: column; gap: 10px; }
      }
    </style>
  </head>

  <body>

    <div id="header_wrap" class="outer">
        <header class="inner">
          <nav>
            <a href="/" class="nav-brand">Clement Yung</a>
          </nav>
          <input id="menu-toggle" class="menu-toggle" type="checkbox" />
          <div class="nav-links-container" id="nav-links-container">
            <div class="nav-links">
              <div class="nav-divider"></div>
              <a href="/resources">Resources</a>
              <a href="/research-talks">Research/Talks</a>
              <a href="/teaching">Teaching</a>
              <a href="/jech-solutions">Jech Solutions</a>
              <a href="/files/Curriculum_Vitae.pdf">CV</a>
            </div>
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme"></button>
            <label class="menu-button-container" for="menu-toggle">
              <div class="menu-button"></div>
            </label>
          </div>
        </header>
    </div>

    <div class="canvas-container" id="canvas-container">
      <div class="middle-layer-wrap" id="middle-layer">
        {% if page.title %}
        <div class="middle-layer-title-container" id="title-container">
          <h1>{{ page.title }}</h1>
        </div>
        {% endif %}
      </div>
      <div id="main_content_wrap" class="outer">
        <section id="main_content" class="inner">
          {{ content }}
        </section>
      </div>
    </div>

    <!-- =======================================================
         ALIGNED WING FOOTER WITH SYMMETRIC GS EMBLEM
         ======================================================= -->
    <div id="footer_wrap" class="outer">
      <footer class="inner">
        <div class="footer-container">
          
          <!-- Left Wing Attribution -->
          <div class="footer-left">
            <span>Published with <a href="https://pages.github.com" target="_blank">GitHub Pages</a></span>
          </div>
          
          <!-- Right Wing Contact Assembly -->
          <div class="footer-right">
            <strong>Connect with me:</strong>
            <div class="footer-profiles-group">
              
              <!-- Vector Link 1: Envelope Mail -->
              <a href="mailto:clement.yung@mail.utoronto.ca" title="Email Me">
                <svg viewBox="0 0 24 24">
                  <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
              </a>

              <!-- Vector Link 2: Classic Google Scholar Graduation Cap -->
              <a href="https://scholar.google.com/citations?user=aY61ag0AAAAJ" title="Google Scholar">
                <svg viewBox="0 0 24 24">
                  <path d="M12 24a7 7 0 1 1 0-14 7 7 0 0 1 0 14zm0-24L0 6.667 12 13.333l12-6.666L12 0z"/>
                </svg>
              </a>

              <!-- Vector Link 3: LinkedIn Corporate Silhouette -->
              <a href="https://linkedin.com/in/clement-yung-255339145" title="LinkedIn">
                <svg viewBox="0 0 24 24">
                  <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
              </a>
              
            </div>
          </div>
          
        </div>
      </footer>
    </div>

    <!-- =======================================================
         GLOBAL MODAL HOOK STRUCTURE
         ======================================================= -->
    <div class="site-modal-overlay" id="global-site-modal">
      <div class="site-modal-window">
        <div class="site-modal-header">
          <h3 id="global-modal-title">Popup</h3>
          <button class="site-modal-close-btn" id="global-modal-close" aria-label="Close popup">&times;</button>
        </div>
        <div class="site-modal-body" id="global-modal-body"></div>
      </div>
    </div>

    <!-- Theme Logic -->
    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const rootElement = document.documentElement;
      const savedTheme = localStorage.getItem('site-theme') || 'dark';
      rootElement.setAttribute('data-theme', savedTheme);
      updateToggleIcon(savedTheme);

      toggleBtn.addEventListener('click', () => {
        const currentTheme = rootElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        rootElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('site-theme', newTheme);
        updateToggleIcon(newTheme);
      });

      function updateToggleIcon(theme) {
        if (theme === 'light') {
          toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.22" x2="5.64" y2="17.8"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
        } else {
          toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        }
      }
    </script>

    <!-- =======================================================
         GLOBAL MODAL CORE CONTROL SCRIPT
         ======================================================= -->
    <script>
      window.openSiteModal = function(title, contentHtml) {
        const overlay = document.getElementById('global-site-modal');
        const modalTitle = document.getElementById('global-modal-title');
        const modalBody = document.getElementById('global-modal-body');
        
        if (overlay && modalTitle && modalBody) {
          modalTitle.textContent = title;
          modalBody.innerHTML = contentHtml;
          overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
        }
      };

      window.closeSiteModal = function() {
        const overlay = document.getElementById('global-site-modal');
        if (overlay) {
          overlay.classList.remove('active');
          document.body.style.overflow = '';
        }
      };

      document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('global-site-modal');
        const closeBtn = document.getElementById('global-modal-close');

        if (closeBtn) closeBtn.addEventListener('click', window.closeSiteModal);
        if (overlay) {
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) window.closeSiteModal();
          });
        }
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && overlay && overlay.classList.contains('active')) {
            window.closeSiteModal();
          }
        });
      });
    </script>
  </body>
</html>
